<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- SEO -->
    <title>GamePadCMS - Headless CMS for Game Developers</title>
    <meta name="description"
          content="GamePadCMS is a headless CMS built for Unity apps. Manage different file formats remotely and update your content without rebuilding." />

    <link rel="canonical" href="https://www.gamepadcms.com/" />

    <!-- Open Graph (social sharing) -->
    <meta property="og:title" content="GamePadCMS - Headless CMS for Game Developers" />
    <meta property="og:description" content="Manage you content remotely for Unity apps using a headless CMS." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://www.gamepadcms.com/" />
    <meta property="og:image" content="https://www.gamepadcms.com/preview.png" />

    <!-- Theme -->
    <meta name="theme-color" content="#0f172a">

    <base href="/" />

    <!-- Styles -->
    <link rel="stylesheet" href="lib/bootstrap/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="stylesheet" href="GamePadCMS_Website.styles.css" />

    <!-- Fonts -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Space+Mono:wght@400;700&family=VT323&display=swap" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="favicon.png" />
</head>

<body>
    <div id="app">
        <svg class="loading-progress">
            <circle r="40%" cx="50%" cy="50%" />
            <circle r="40%" cx="50%" cy="50%" />
        </svg>
        <div class="loading-progress-text"></div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="." class="reload">Reload</a>
        <span class="dismiss">🗙</span>
    </div>
    <script src="_framework/blazor.webassembly.js"></script>
</body>

</html>
